[env]
TERM = "xterm-256color"

[window]
opacity = 0.8
padding = { x = 20, y = 20 }
decorations = "Buttonless"      # macOS向けの設定
blur = true
level = "Normal"
option_as_alt = "Both"

[font]
normal = { family = "JetBrainsMono Nerd Font", style = "Regular" }
bold = { family = "JetBrainsMono Nerd Font", style = "Bold" }
italic = { family = "JetBrainsMono Nerd Font", style = "Italic" }
bold_italic = { family = "JetBrainsMono Nerd Font", style = "Bold Italic" }
size = 14.0

[colors.primary]
background = "0x1e1e2e"
foreground = "0xcdd6f4"

[selection]
save_to_clipboard = true        # 選択したテキストをクリップボードに保存

# Cmdキー（Super）のバインディング設定

[[keyboard.bindings]]
key = "Return"
mods = "Command|Shift"
action = "SpawnNewInstance"     # 新しいインスタンスを起動

# ======================
# tmux連携キーバインド
# ======================

# Ctrl+Shift+t → tmuxへ送信（新規ウィンドウ）
# NOTE: CSI u形式で大文字Tを送信
[[keyboard.bindings]]
key = "T"
mods = "Control|Shift"
chars = "\u001b[84;5u"

# Ctrl+hjkl → mini.move（行/選択範囲移動）用
[[keyboard.bindings]]
key = "H"
mods = "Control"
chars = "\u001b[104;5u"

[[keyboard.bindings]]
key = "J"
mods = "Control"
chars = "\u001b[106;5u"

[[keyboard.bindings]]
key = "K"
mods = "Control"
chars = "\u001b[107;5u"

[[keyboard.bindings]]
key = "L"
mods = "Control"
chars = "\u001b[108;5u"

# Ctrl+Shift+hjkl → nvim/tmuxペイン移動用
[[keyboard.bindings]]
key = "H"
mods = "Control|Shift"
chars = "\u001b[104;6u"

[[keyboard.bindings]]
key = "J"
mods = "Control|Shift"
chars = "\u001b[106;6u"

[[keyboard.bindings]]
key = "K"
mods = "Control|Shift"
chars = "\u001b[107;6u"

[[keyboard.bindings]]
key = "L"
mods = "Control|Shift"
chars = "\u001b[108;6u"
