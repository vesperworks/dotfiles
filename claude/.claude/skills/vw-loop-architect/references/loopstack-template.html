<style>
/* ===== Theme + Grid tokens (ONE source of truth) ===== */
:root, [data-theme="dark"] {
  --cols: 12; --bl: 8px; --lh: 24px; --gutter: 24px; --margin: 48px; --maxw: 1200px; --pad: 48px;
  --font-sans: 'Inter', -apple-system, sans-serif;
  --font-mono: 'JetBrains Mono', 'SF Mono', monospace;
  --bg: #0a0a0a; --surface: #111111; --surface-hover: #1a1a1a;
  --border: #222222; --border-accent: #333333;
  --text: #e0e0e0; --text-muted: #666666; --text-dim: #444444;
  --accent: #00ff88; --accent-dim: rgba(0,255,136,0.15);
  --cyan: #00d4ff; --cyan-dim: rgba(0,212,255,0.15);
  --warn: #ffaa00; --danger: #ff5555; --purple: #cc44ff;
  --g-col: rgba(0,255,136,0.05); --g-edge: rgba(0,255,136,0.25);
  --g-base: rgba(0,212,255,0.18); --g-base-min: rgba(0,212,255,0.06);
}
[data-theme="light"] {
  --bg: #ffffff; --surface: #f4f4f4; --surface-hover: #eaeaea;
  --border: #d4d4d4; --border-accent: #bbbbbb;
  --text: #111315; --text-muted: #5b6066; --text-dim: #999999;
  --accent: #e4002b; --accent-dim: rgba(228,0,43,0.08);
  --cyan: #0055aa; --cyan-dim: rgba(0,85,170,0.08);
  --warn: #b86e00; --danger: #cc0000; --purple: #6622aa;
  --g-col: rgba(228,0,43,0.06); --g-edge: rgba(228,0,43,0.35);
  --g-base: rgba(0,150,140,0.25); --g-base-min: rgba(0,150,140,0.10);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-sans); background: var(--bg); color: var(--text); font-size: 16px; line-height: var(--lh); -webkit-font-smoothing: antialiased; }

.spread { position: relative; width: 100%; }
.wrap { position: relative; max-width: var(--maxw); margin: 0 auto; padding: var(--pad) var(--margin) 96px; }
.grid { display: grid; grid-template-columns: repeat(var(--cols), 1fr); column-gap: var(--gutter); row-gap: var(--lh); }
.band { grid-column: 1 / -1; display: grid; grid-template-columns: subgrid; column-gap: var(--gutter); align-items: start; }
@supports not (grid-template-columns: subgrid) { .band { grid-template-columns: repeat(var(--cols), 1fr); } }

.guides { position: absolute; inset: 0; pointer-events: none; z-index: 60; opacity: 0; transition: opacity .26s ease; }
body.grid-on .guides { opacity: 1; }
.guides .cols { position: absolute; top: 0; bottom: 0; left: var(--margin); right: var(--margin); display: grid; grid-template-columns: repeat(var(--cols), 1fr); column-gap: var(--gutter); }
.guides .col { background: var(--g-col); box-shadow: inset 1px 0 0 var(--g-edge), inset -1px 0 0 var(--g-edge); position: relative; }
.guides .col span { position: absolute; top: 32px; left: 0; right: 0; text-align: center; font-family: var(--font-mono); font-size: 10px; line-height: 1; color: var(--accent); opacity: 0.6; }
.guides .rows { position: absolute; left: var(--margin); right: var(--margin); top: var(--pad); bottom: 0; background-image: repeating-linear-gradient(to bottom, var(--g-base) 0 1px, transparent 1px var(--lh)), repeating-linear-gradient(to bottom, var(--g-base-min) 0 1px, transparent 1px var(--bl)); }
.guides .mline { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--g-edge); }
.guides .mline.l { left: var(--margin); } .guides .mline.r { right: var(--margin); }

.toolbar { position: fixed; top: 16px; right: 16px; z-index: 200; display: flex; align-items: center; gap: 8px; }
.toolbar button { font-family: var(--font-mono); font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase; padding: 8px 12px; border: 1px solid var(--border-accent); background: var(--surface); color: var(--text-muted); cursor: pointer; transition: all 0.15s; line-height: 16px; }
.toolbar button:hover { border-color: var(--accent); color: var(--accent); }

.header { grid-column: 1 / -1; display: grid; grid-template-columns: subgrid; column-gap: var(--gutter); align-items: end; padding-bottom: var(--lh); border-bottom: 2px solid var(--accent); margin-bottom: var(--lh); }
@supports not (grid-template-columns: subgrid) { .header { grid-template-columns: repeat(var(--cols), 1fr); } }
.header h1 { grid-column: 1 / 10; font-family: var(--font-mono); font-size: 1.35rem; font-weight: 700; line-height: 32px; letter-spacing: -0.02em; color: var(--accent); }
.header h1 span { color: var(--text-muted); font-weight: 400; }
.header .meta { grid-column: 10 / 13; font-family: var(--font-mono); color: var(--text-muted); font-size: 0.68rem; text-align: right; line-height: var(--lh); letter-spacing: 0.03em; }

.summary { grid-column: 1 / -1; background: var(--surface); border-left: 3px solid var(--cyan); padding: 16px var(--gutter); font-size: 0.9rem; line-height: var(--lh); }

.panel { background: var(--surface); border: 1px solid var(--border); overflow: hidden; grid-column: 1 / -1; }
.panel-header { display: flex; justify-content: space-between; align-items: center; padding: 12px var(--gutter); border-bottom: 1px solid var(--border); }
.panel-header h2 { font-family: var(--font-mono); font-size: 0.7rem; font-weight: 500; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; line-height: var(--lh); }
.panel-header .tag { font-family: var(--font-mono); font-size: 0.6rem; color: var(--accent); background: var(--accent-dim); padding: 2px 8px; letter-spacing: 0.05em; line-height: 16px; }
.panel-body { padding: 40px 90px 32px 32px; overflow-x: auto; }

/* ===== Loop Stack (nested rounded boxes) ===== */
.loopstack-title { font-family: var(--font-mono); font-weight: 700; font-size: 0.72rem; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 28px; }

.loop {
  position: relative;
  border-radius: 22px;
  border: none;
  background: var(--loop-bg, transparent);
  padding: 30px 34px 34px;
  margin-bottom: 0;
}
.loop + .loop { margin-top: 0; }
.loop-inner { margin-top: 22px; }
/* Extra headroom when the previous sibling is a chip-row: the nested loop's exit
   label floats above its own border, and without this the label collides with the
   chip pills sitting just above it. */
.chip-row + .loop-inner { margin-top: 44px; }

.loop[data-level="0"] { --loop-border: var(--accent); --loop-bw: 2; --loop-bg: var(--loop-bg-0, rgba(0,255,136,0.03)); background: var(--loop-bg); }
.loop[data-level="1"] { --loop-border: var(--cyan); --loop-bw: 1.5; --loop-bg: var(--loop-bg-1, rgba(0,212,255,0.03)); background: var(--loop-bg); }
.loop[data-level="2"] { --loop-border: var(--purple); --loop-bw: 1.5; --loop-bg: var(--loop-bg-2, rgba(204,68,255,0.03)); background: var(--loop-bg); }
.loop[data-level="3"] { --loop-border: var(--warn); --loop-bw: 1.5; --loop-bg: var(--loop-bg-3, rgba(255,170,0,0.03)); background: var(--loop-bg); }
.loop[data-level="4"] { --loop-border: var(--danger); --loop-bw: 1.5; --loop-bg: var(--loop-bg-4, rgba(255,85,85,0.04)); background: var(--loop-bg); }

/* The box outline is drawn entirely by an SVG path (not CSS border): the path runs the
   full rounded-rect perimeter but stops just short of the top-right corner — from that
   exact point a second path (the arrow) continues straight and terminates in an arrowhead,
   fully inside the box. No pixel is ever masked/painted-over; the "gap" is simply where
   neither path draws anything, so there is no seam to misalign. Recomputed in JS
   (layoutLoopBorders) since box size depends on content. */
.loop-border-svg { position: absolute; inset: 0; width: 100%; height: 100%; overflow: visible; pointer-events: none; }
.loop-border-svg .border-path { fill: none; stroke: var(--loop-border); stroke-linecap: round; stroke-linejoin: round; }
.loop-border-svg .arrow-line { stroke: var(--loop-border); stroke-linecap: butt; }
.loop-border-svg .arrowhead { fill: var(--loop-border); }

.loop-head {
  display: flex; align-items: flex-start; gap: 24px; flex-wrap: wrap;
}
.loop-label-group { min-width: 220px; }
.loop-label {
  font-family: var(--font-mono); font-weight: 700; font-size: 0.92rem; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--loop-border, var(--text));
}
.loop-desc { margin-top: 4px; font-size: 0.78rem; color: var(--text-muted); line-height: 18px; max-width: 34em; }

/* Exit label only — the arrow itself is drawn by .loop-border-svg above. The right offset
   (32px = corner radius 22 + stub 10, i.e. flush with the stub's left end / where the
   border resumes) is a fixed distance from the box's own right edge regardless of box
   width, so this can stay pure CSS. */
.loop-exit-overlay {
  position: absolute; top: 0; right: 0; width: 0; height: 0; overflow: visible; pointer-events: none;
}
.loop-exit-overlay .exit-label {
  position: absolute; right: 32px; bottom: 9px; white-space: nowrap; text-align: right;
  font-family: var(--font-mono); font-size: 0.7rem; color: var(--text);
}
.loop-exit-overlay .exit-label b { color: var(--loop-border, var(--accent)); font-weight: 600; }

.chip-row { display: flex; align-items: center; flex-wrap: wrap; gap: 8px; margin-top: 18px; }
.chip {
  font-family: var(--font-mono); font-size: 0.66rem; color: var(--text);
  background: var(--surface-hover); border: 1px solid var(--border-accent);
  border-radius: 999px; padding: 5px 12px; white-space: nowrap;
}
.chip.result { color: var(--loop-border, var(--accent)); border-color: var(--loop-border, var(--accent)); background: transparent; }
.chip-arrow { color: var(--text-dim); font-size: 0.72rem; }

.footer { grid-column: 1 / -1; padding-top: var(--lh); border-top: 1px solid var(--border); font-family: var(--font-mono); font-size: 0.6rem; color: var(--text-dim); letter-spacing: 0.05em; display: grid; grid-template-columns: subgrid; column-gap: var(--gutter); line-height: var(--lh); }
@supports not (grid-template-columns: subgrid) { .footer { grid-template-columns: repeat(var(--cols), 1fr); } }
.footer .left { grid-column: 1 / 7; } .footer .right { grid-column: 7 / 13; text-align: right; }

.credit { grid-column: 1 / -1; text-align: right; font-family: var(--font-mono); font-size: 0.62rem; color: var(--text-dim); margin-top: 4px; }

.toast { position: fixed; bottom: 56px; right: 24px; background: var(--surface); border: 1px solid var(--accent); color: var(--accent); font-family: var(--font-mono); font-size: 0.8rem; padding: 12px 18px; opacity: 0; transform: translateY(8px); transition: opacity 0.2s, transform 0.2s; pointer-events: none; z-index: 1000; max-width: 360px; line-height: var(--lh); }
.toast.show { opacity: 1; transform: translateY(0); }

.hud { position: fixed; bottom: 0; left: 0; right: 0; z-index: 300; background: rgba(10,10,10,0.92); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); border-top: 1px solid #333; padding: 6px 16px; display: flex; align-items: center; gap: 16px; font-family: 'JetBrains Mono', 'SF Mono', monospace; font-size: 0.65rem; letter-spacing: 0.06em; color: #888; user-select: none; }
.hud .sep { color: #333; } .hud .val { color: #00ff88; } .hud .cat { color: #666; }
.hud .key { display: inline-block; padding: 1px 5px; border: 1px solid #444; border-radius: 2px; font-size: 0.6rem; color: #666; margin: 0 1px; }
.hud .hint { margin-left: auto; display: flex; gap: 10px; }

@media (max-width: 720px) {
  .loop { padding: 22px 18px 24px; border-radius: 16px; }
}
</style>

<script>
function toast(msg, kind = 'ok') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.borderColor = kind === 'err' ? 'var(--danger)' : 'var(--accent)';
  t.style.color = kind === 'err' ? 'var(--danger)' : 'var(--accent)';
  t.classList.add('show');
  clearTimeout(window.__toastTimer);
  window.__toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

function debounce(fn, ms) {
  let t;
  return function (...args) {
    clearTimeout(t);
    t = setTimeout(() => fn.apply(this, args), ms);
  };
}

/* Loop Stack border+arrow renderer.
   Each .loop's outline is one SVG path that runs the full rounded-rect perimeter but
   stops short of the top-right corner — via a short straight "stub" (measured off the
   reference: ~10px of unbroken top edge immediately before the corner arc begins) —
   and a second path (line + arrowhead) continues straight from that exact stop point,
   ending inside the box a further ~10px short of the stub. Nothing is masked or painted
   over — the gap is simply empty canvas — so there is no seam/pixel to misalign. Box
   size depends on content (nested loops, text length), so this recomputes from actual
   rendered dimensions. */
function layoutLoopBorders() {
  const R = 22;          // corner radius
  const STUB_LEN = 10;   // straight run of border immediately before the corner arc
  const TRUE_GAP = 10;   // empty space between arrowhead tip and the stub's start
  const HEAD_LEN = 16;   // arrowhead length (base to tip)
  const SHAFT_LEN = 90;  // straight shaft length before the arrowhead
  document.querySelectorAll('.loop').forEach((loopEl) => {
    const svg = loopEl.querySelector(':scope > svg.loop-border-svg');
    if (!svg) return;
    const w = loopEl.clientWidth;
    const h = loopEl.clientHeight;
    if (!w || !h) return;
    const bw = parseFloat(getComputedStyle(loopEl).getPropertyValue('--loop-bw')) || 1.5;
    const r = Math.max(4, Math.min(R, h / 2 - 2, w / 2 - 2));
    const stub = Math.min(STUB_LEN, Math.max(0, w * 0.5 - r));
    const stubStartX = w - r - stub;
    const arrowTipX = stubStartX - TRUE_GAP;
    const headStartX = arrowTipX - HEAD_LEN;
    const arrowTailX = Math.max(r, headStartX - SHAFT_LEN);

    svg.setAttribute('viewBox', `0 0 ${w} ${h}`);
    svg.setAttribute('width', w);
    svg.setAttribute('height', h);

    const border = svg.querySelector('.border-path');
    border.setAttribute('d',
      `M ${stubStartX} 0 ` +
      `L ${w - r} 0 ` +
      `A ${r} ${r} 0 0 1 ${w} ${r} ` +
      `L ${w} ${h - r} ` +
      `A ${r} ${r} 0 0 1 ${w - r} ${h} ` +
      `L ${r} ${h} ` +
      `A ${r} ${r} 0 0 1 0 ${h - r} ` +
      `L 0 ${r} ` +
      `A ${r} ${r} 0 0 1 ${r} 0 ` +
      `L ${arrowTailX} 0`
    );
    border.setAttribute('stroke-width', bw);

    const arrowLine = svg.querySelector('.arrow-line');
    arrowLine.setAttribute('x1', arrowTailX);
    arrowLine.setAttribute('y1', 0);
    arrowLine.setAttribute('x2', headStartX);
    arrowLine.setAttribute('y2', 0);
    arrowLine.setAttribute('stroke-width', bw);

    const head = svg.querySelector('.arrowhead');
    const headHalf = bw * 3.2;
    head.setAttribute('points', `${headStartX},${-headHalf} ${arrowTipX},0 ${headStartX},${headHalf}`);
  });
}

    font: parseInt(localStorage.getItem('html-preset-font') || '0', 10) % FONT_PRESETS.length
  };

  var root = document.documentElement;

  function applyColor(idx) {
    var p = COLOR_PRESETS[idx];
    root.setAttribute('data-theme', p.theme);
    for (var k in p.vars) root.style.setProperty(k, p.vars[k]);
    state.color = idx;
    localStorage.setItem('html-preset-color', String(idx));
    updateHUD();
    updateThemeToggle();
  }

  function applyFont(idx) {
    var p = FONT_PRESETS[idx];
    root.style.setProperty('--font-sans', p.family);
    state.font = idx;
    localStorage.setItem('html-preset-font', String(idx));
    updateHUD();
  }

  function cycle(type, dir) {
    var presets = type === 'color' ? COLOR_PRESETS : FONT_PRESETS;
    var cur = state[type];
    var next = (cur + dir + presets.length) % presets.length;
    if (type === 'color') applyColor(next);
    else applyFont(next);
    toast((type === 'color' ? 'COLOR' : 'FONT') + ': ' + presets[next].name);
    if (typeof layoutLoopBorders === 'function') requestAnimationFrame(layoutLoopBorders);
  }

  function updateHUD() {
    var hud = document.getElementById('hud');
    if (!hud) return;
    var cp = COLOR_PRESETS[state.color];
    var fp = FONT_PRESETS[state.font];
    hud.innerHTML =
      'COLOR: <span class="val">' + cp.name + '</span>' +
      ' <span class="sep">│</span> ' +
      'FONT: <span class="val">' + fp.name + '</span> ' +
      '<span class="cat">(' + fp.cat + ')</span>' +
      '<span class="hint">' +
        '<span><span class="key">J</span><span class="key">K</span> color</span>' +
        '<span><span class="key">N</span><span class="key">P</span> font</span>' +
        '<span><span class="key">G</span> grid</span>' +
        '<span><span class="key">E</span> export</span>' +
      '</span>';
  }

  function updateThemeToggle() {
    var btn = document.getElementById('themeToggle');
    if (!btn) return;
    btn.textContent = COLOR_PRESETS[state.color].name;
    btn.setAttribute('aria-label', 'Cycle color preset (current: ' + COLOR_PRESETS[state.color].name + ')');
  }

  function exportStatic() {
    var clone = document.documentElement.cloneNode(true);
    clone.querySelectorAll('[data-removable], script').forEach(function(el) { el.remove(); });
    var fp = FONT_PRESETS[state.font];
    var fontLink = clone.querySelector('link[href*="fonts.googleapis.com"]');
    if (fontLink) {
      fontLink.href = 'https://fonts.googleapis.com/css2?family='
        + fp.gf + '&family=JetBrains+Mono:wght@400;500;700&display=swap';
    }
    var html = '<!DOCTYPE html>\n' + clone.outerHTML;
    var blob = new Blob([html], { type: 'text/html' });
    var a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = '{{EXPORT_FILENAME}}_export.html';
    a.click();
    URL.revokeObjectURL(a.href);
    toast('Static HTML exported');
  }

  var fontLink = document.querySelector('link[href*="fonts.googleapis.com"]');
  if (fontLink) { fontLink.href = ALL_FONTS_URL; }
  else {
    var l = document.createElement('link');
    l.rel = 'stylesheet'; l.href = ALL_FONTS_URL;
    document.head.appendChild(l);
  }

  document.addEventListener('DOMContentLoaded', function() {
    var hud = document.createElement('div');
    hud.id = 'hud'; hud.className = 'hud';
    hud.setAttribute('data-removable', '');
    document.body.appendChild(hud);

    applyColor(state.color);
    applyFont(state.font);

    document.querySelectorAll('.guides .cols').forEach(function(h) {
      var n = parseInt(getComputedStyle(root).getPropertyValue('--cols').trim() || '12', 10);
      for (var i = 1; i <= n; i++) {
        var c = document.createElement('div');
        c.className = 'col';
        var s = document.createElement('span');
        s.textContent = i;
        c.appendChild(s);
        h.appendChild(c);
      }
    });

    var oldBtn = document.getElementById('themeToggle');
    if (oldBtn) {
      var newBtn = oldBtn.cloneNode(true);
      oldBtn.parentNode.replaceChild(newBtn, oldBtn);
      newBtn.addEventListener('click', function() { cycle('color', 1); });
      updateThemeToggle();
    }

    document.addEventListener('keydown', function(e) {
      if (e.target.matches('input,textarea,select,[contenteditable]')) return;
      if (e.metaKey || e.ctrlKey || e.altKey) return;
      switch (e.key) {
        case 'j': case 'J': cycle('color', -1); break;
        case 'k': case 'K': cycle('color', 1); break;
        case 'n': case 'N': cycle('font', -1); break;
        case 'p': case 'P': cycle('font', 1); break;
        case 'g': case 'G':
          document.body.classList.toggle('grid-on');
          toast(document.body.classList.contains('grid-on') ? 'Grid ON' : 'Grid OFF');
          break;
        case 'e': case 'E': exportStatic(); break;
      }
    });
  });
})();

document.addEventListener('DOMContentLoaded', layoutLoopBorders);
window.addEventListener('load', layoutLoopBorders);
if (document.fonts && document.fonts.ready) document.fonts.ready.then(layoutLoopBorders);
window.addEventListener('resize', debounce(layoutLoopBorders, 100));
</script>
</body>
</html>
