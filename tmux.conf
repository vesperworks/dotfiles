# ======================
# tmux Configuration
# ======================

# プレフィックスキーをCtrl+aに変更（Alacritty対応）
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# 基本設定
set -g default-terminal "screen-256color"
set -ga terminal-overrides ",xterm-256color:Tc"
set -g mouse on
set -g history-limit 10000
set -g focus-events on
set -sg escape-time 0

# ウィンドウとペインのインデックスを1から開始
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウ番号を自動的に振り直す（無効化）
# set -g renumber-windows on

# ======================
# キーバインド設定
# ======================

# 設定ファイル再読み込み
bind r source-file ~/.config/tmux/tmux.conf \; display "Config reloaded!"

# ペイン分割（使いやすいキー）
bind | split-window -h    # Ctrl+a + | で縦分割
bind - split-window -v    # Ctrl+a + - で横分割

# ウィンドウ・ペイン削除（使いやすいキー）
unbind q                  # デフォルトのdisplay-panesを無効化
bind q kill-window        # Ctrl+a + q でウィンドウ削除
bind x kill-pane          # Ctrl+a + x でペイン削除（デフォルトと同じ）
bind p display-panes      # Ctrl+a + p でペイン番号表示（元のqの機能）
bind Q kill-session       # Ctrl+a + Q でセッション終了

# ======================
# tmux-nvim navigation integration
# ======================

# nvimが動いているかを判定する関数
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

# Ctrl+hjklでの移動（nvim内かtmuxペインかを自動判定）
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# Ctrl+\での前のペインへの移動
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(\\.[0-9]+)?).*/\\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

# コピーモードでの移動
bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# ======================
# プラグイン設定
# ======================

# PATH設定（HomebrewのbashでTPMを実行するため）
set-environment -g PATH "/opt/homebrew/bin:/usr/local/bin:/bin:/usr/bin"

# TPM（Tmux Plugin Manager）設定
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'janoamaral/tokyo-night-tmux'

# Tokyo Night テーマ設定
set -g @tokyo-night-tmux_theme 'storm'  # night/storm/day/moon
set -g @tokyo-night-tmux_transparent 0  # 1で透明化
set -g @tokyo-night-tmux_show_battery_widget 0
set -g @tokyo-night-tmux_show_datetime_widget 1

# TPM初期化（この行は設定ファイルの最後に置く）
run '~/.config/tmux/plugins/tpm/tpm'
